name: 每日更新岛屿数据

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests beautifulsoup4

      - run: python scraper.py

      - run: |
          git config user.name "Maldives Data Bot"
          git config user.email "bot@maldives-selector.app"
          git add data.json
          git diff --quiet && echo "无数据变更" || \
            (git commit -m "chore: 每日岛屿数据更新 $(date +'%Y-%m-%d')" && \
             git push)
