name: 每日更新岛屿数据

on:
  schedule:
    # 每天 UTC 00:00（北京时间 08:00）运行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 运行数据更新
        run: |
          python scraper/scraper.py

      - name: 提交更新（如有变更）
        run: |
          git config user.name "Maldives Data Bot"
          git config user.email "bot@maldives-selector.app"
          git add data.json
          git diff --quiet && echo "无数据变更" || \
            (git commit -m "chore: 每日岛屿数据更新 $(date +'%Y-%m-%d')" && \
             git push)
